name: 리터세이브 배포

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node.js 준비
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Node/npm 버전 확인
        run: |
          node --version
          npm --version

      - name: 의존성 설치
        shell: bash
        run: |
          set -e
          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false

          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --no-audit --no-fund --prefer-online; then
              echo "의존성 설치 완료"
              exit 0
            fi

            echo "npm ci 실패. npm 캐시와 node_modules 정리 후 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          echo "의존성 설치에 실패했습니다. package-lock.json과 npm 로그를 확인해주세요."
          exit 1

      - name: 오피넷 데이터 생성
        run: npm run generate:data
        env:
          OPINET_CERT_KEY: ${{ secrets.OPINET_CERT_KEY }}
          OPINET_REGIONS: ${{ vars.OPINET_REGIONS }}
          OPINET_FUELS: ${{ vars.OPINET_FUELS }}
          OPINET_COUNT: "20"
          OPINET_API_BASE: "http://www.opinet.co.kr/api"
          OPINET_AUTH_PARAM: "code"
          HISTORY_RETENTION_DAYS: "90"

      - name: 유가 리포트 생성
        run: npm run generate:report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}

      - name: 누적 데이터 저장소 반영
        shell: bash
        run: |
          if git diff --quiet -- public/data/oil-prices.json public/data/oil-history.json public/data/oil-ai-report.json; then
            echo "반영할 데이터 변경이 없습니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/oil-prices.json public/data/oil-history.json public/data/oil-ai-report.json
          git commit -m "chore: 가격 데이터 자동 갱신 [skip ci]"
          git push origin HEAD:main

      - name: GitHub Pages 준비
        uses: actions/configure-pages@v6

      - name: React 앱 빌드
        run: npm run build

      - name: 배포 아티팩트 업로드
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5.0.0
