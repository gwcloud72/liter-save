name: Deploy Liter Save

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Opinet data
        run: npm run generate:data
        env:
          OPINET_CERT_KEY: ${{ secrets.OPINET_CERT_KEY }}
          OPINET_REGIONS: ${{ vars.OPINET_REGIONS }}
          OPINET_FUELS: ${{ vars.OPINET_FUELS }}
          OPINET_COUNT: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build React app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
