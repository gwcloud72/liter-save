name: 리터세이브 배포

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js 준비
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: 의존성 설치
        run: npm install --no-audit --no-fund

      - name: 오피넷 데이터 생성
        run: npm run generate:data
        env:
          OPINET_CERT_KEY: ${{ secrets.OPINET_CERT_KEY }}
          OPINET_REGIONS: ${{ vars.OPINET_REGIONS }}
          OPINET_FUELS: ${{ vars.OPINET_FUELS }}
          OPINET_COUNT: "20"
          OPINET_API_BASE: "http://www.opinet.co.kr/api"
          OPINET_AUTH_PARAM: "code"
          HISTORY_RETENTION_DAYS: "90"

      - name: 누적 데이터 저장소 반영
        shell: bash
        run: |
          if git diff --quiet -- public/data/oil-prices.json public/data/oil-history.json; then
            echo "반영할 데이터 변경이 없습니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/oil-prices.json public/data/oil-history.json
          git commit -m "chore: 가격 데이터 자동 갱신 [skip ci]"
          git push origin HEAD:main

      - name: GitHub Pages 준비
        uses: actions/configure-pages@v6

      - name: React 앱 빌드
        run: npm run build

      - name: 배포 아티팩트 업로드
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5
